// 今日の日付をシードにした擬似乱数（同じ日は誰がアクセスしても同じ結果になる）
function seededRandom(seed) {
  let x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}

function getTodaySeed() {
  const now = new Date();
  return now.getFullYear() * 10000 + (now.getMonth() + 1) * 100 + now.getDate();
}

// 今日の12星座ランキングを算出（日付シードで毎日固定、星座ごとにスコアも算出）
function getTodayZodiacRanking() {
  const seed = getTodaySeed();
  const scored = zodiacNames.map((name, i) => {
    const r = seededRandom(seed + i * 137); // 星座ごとに異なる種
    const score = Math.floor(60 + r * 40); // 60〜99点の範囲でスコア化
    return { name, score };
  });
  scored.sort((a, b) => b.score - a.score);
  const ranking = {};
  scored.forEach((item, idx) => {
    ranking[item.name] = { rank: idx + 1, score: item.score };
  });
  return ranking;
}

function calcLifePathNumber(y, m, d) {
  const digits = (String(y) + String(m) + String(d)).split("").map(Number);
  let sum = digits.reduce((a,b)=>a+b, 0);
  while (sum > 9 && sum !== 11 && sum !== 22 && sum !== 33) {
    sum = String(sum).split("").map(Number).reduce((a,b)=>a+b, 0);
    if (sum === 11 || sum === 22 || sum === 33) break;
  }
  return sum;
}

// マヤ暦には「閏年の2月29日は独立したKINとしてカウントしない（前日と同じKIN扱い）」という
// 独自ルールがあるため、単純な日数差ではなく、2/29を除外した通算日数で計算する。
function isLeapYear(y) {
  return (y % 4 === 0 && y % 100 !== 0) || y % 400 === 0;
}

function mayaDayCount(y, m, d) {
  const serial = Date.UTC(y, m - 1, d) / 86400000;
  const baseSerial = Date.UTC(1900, 0, 1) / 86400000;
  let days = serial - baseSerial;

  // 1900/1/1～対象日の間にある「2/29」の数を引く
  let leapDaysPassed = 0;
  for (let yr = 1900; yr < y; yr++) {
    if (isLeapYear(yr)) leapDaysPassed++;
  }
  if (isLeapYear(y) && (m > 2 || (m === 2 && d >= 29))) leapDaysPassed++;

  return days - leapDaysPassed;
}

// 検証済みオフセット（1967/10/28 = KIN108 を基準に算出）
const KIN_OFFSET = 107 - mayaDayCount(1967, 10, 28);

function calcKin(y, m, d) {
  const count = mayaDayCount(y, m, d);
  return ((count + KIN_OFFSET) % 260 + 260) % 260 + 1;
}

function getZodiac(m, d) {

    } else if (sm < em) {
      if ((m === sm && d >= sd) || (m === em && d <= ed) || (m > sm && m < em)) return z.name.replace("2","");
    } else {
      if ((m === sm && d >= sd) || (m === em && d <= ed)) return z.name.replace("2","");

}

document.getElementById("rollDiceBtn").addEventListener("click", () => {
  const redEl = document.getElementById("redDice");
  const blueEl = document.getElementById("blueDice");
  const redNum = redEl.querySelector(".dice-num");
  const blueNum = blueEl.querySelector(".dice-num");
  const diceArea = document.getElementById("diceArea");

  // Web Audio API セットアップ
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  const audioCtx = new AudioCtx();

  // カタッという短い音を鳴らす関数
  function playTick() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = "square";
    osc.frequency.setValueAtTime(180 + Math.random() * 60, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.06);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.06);
  }

  // コトンという止まる音を鳴らす関数
  function playLand() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = "sine";
    osc.frequency.setValueAtTime(280, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.2);
  }

  // 表示
  diceArea.classList.remove("hidden");
  redEl.classList.remove("landed");
  blueEl.classList.remove("landed");
  redEl.classList.add("rolling");
  blueEl.classList.add("rolling");

  // カタカタと数字を切り替える
  const duration = 1200;
  const interval = 80;
  let elapsed = 0;

  const timer = setInterval(() => {
    redNum.textContent = Math.floor(Math.random() * 12) + 1;
    blueNum.textContent = Math.floor(Math.random() * 12) + 1;
    playTick();
    elapsed += interval;

    if (elapsed >= duration) {
      clearInterval(timer);
      redValue = Math.floor(Math.random() * 12) + 1;
      blueValue = Math.floor(Math.random() * 12) + 1;
      redNum.textContent = redValue;
      blueNum.textContent = blueValue;
      redEl.classList.remove("rolling");
      blueEl.classList.remove("rolling");
      redEl.classList.add("landed");
      blueEl.classList.add("landed");
      playLand();
    }
  }, interval);
});

        <p>${zodiac}生まれで${blood}型のあなたは、${bloodTypeText[blood]}好きな数字「${luckyNum}」を選んだあなたは、きっとその数字に何か特別な響きを感じているのではないでしょうか。数字には、その人だけの意味が宿っていることがあります。</p>
      </div>

      <div class="section">
        <h2>マヤの暦が語る、あなたの本質（KIN${kin}）</h2>
        <p>あなたが生まれた日、宇宙には「${sunSeal}」のエネルギーが流れていました。これはあなたが表向きに発揮している、いわば顕在的な性質です。そしてその奥には「${waveSpell}」という、もう一つの顔が眠っています。これは普段あまり意識されない、潜在的な才能。誰かに指摘されてはじめて「そうかもしれない」と気づくような、隠れた一面かもしれません。</p>
        <p>さらに、あなたには「音${toneNum}（${tone}）」というエネルギーの使い方の傾向も刻まれています。表の性質と、奥に眠る才能と、エネルギーの流し方。この3つが重なり合って、唯一無二のあなたという人をかたちづくっているのです。</p>
      </div>

      <div class="section">
        <h2>数秘術が語る、あなたの人生のテーマ</h2>
        <p>生年月日の数字をすべて足し合わせていくと、あなたのライフパスナンバーは「${lifePath}」になりました。${lifePathDesc}</p>
        <p>これは今日だけの話ではなく、あなたがこれから歩んでいく人生全体に流れているテーマです。ふとした瞬間に、この数字の力を思い出してみてください。</p>
      </div>

      <div class="section">
        <h2>今日選んでいただいた「${todayTheme.name}」について</h2>
        <p>${selectedImageData.comment}</p>
      </div>

      <div class="section highlight">
        <h2>今日、特に大切にしてほしいこと</h2>
        <p>あなたの本質と、今日という日が重なり合うところに、「${red.theme}」が${red.intensity}く動く気配が見えています。そして「${blue.theme}」という視点が、今日のあなたにとって大きな鍵になりそうです。</p>
        <p>${guidance.trigger}そのとき、${guidance.choice}</p>
        <p>${luckyItem}</p>
      </div>

      <div class="section">
        <h2>今日、積極的に動くといいこと</h2>
        <p>${actionGuidance.active}</p>
      </div>

      <div class="section">
        <h2>今日、あまり深追いせず静観したほうがいいこと</h2>
        <p>${actionGuidance.passive}</p>
      </div>

      <div class="section">
        <h2>今日のキーワード</h2>
        <p class="keyword">${keyword.en} <span class="keyword-ja">（${keyword.ja}）</span></p>
      </div>

      <div class="section">
        <h2>今日の${timeOfDay}に、そっと心にとめておいてほしいこと</h2>
        <p>${timeMessage}</p>
      </div>

      <p class="closing">今日という日が、あなたにとって少しでも優しいものになりますように。<br>また明日、お会いしましょう。<br><span class="signature">— Sumiko</span></p>
    </div>

    <div id="shareCard">
      <p class="share-title">${xAccountLabel}今日の占い結果</p>
      <div class="share-stats">
        <span>${zodiac} ${myRanking.rank}位／12星座</span>
        <span>運勢スコア ${myRanking.score}点</span>
        <span>KIN${kin}・${sunSeal}</span>
      </div>
      <p class="share-keyword">${keyword.en}（${keyword.ja}）</p>
      <p class="share-msg">${shareMsg}</p>
      <p class="share-encouragement">✨ ${encouragement}</p>
      <p class="share-date">占い実施日時：${dateLabel}</p>
      <p class="share-footer">四つの星命秘録 by Sumiko Ellington</p>
    </div>

    <p class="share-guide" id="shareGuide"></p>
    <div style="margin-top:8px; display:flex; gap:10px; flex-wrap:wrap;" id="shareButtons"></div>
  `;

  document.getElementById("resultArea").innerHTML = html;
  document.getElementById("resultArea").classList.remove("hidden");
  document.getElementById("formArea").classList.add("hidden");

  // Web Share API対応チェック
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || window.innerWidth <= 768;
  const canShare = typeof navigator.share === "function";
  const guideEl = document.getElementById("shareGuide");
  const btnsEl = document.getElementById("shareButtons");

  // Canvas画像生成関数（PC・スマホ共通）
  function generateCanvasImage() {
    const canvas = document.createElement("canvas");
    const W = 600, H = 420;
    canvas.width = W * 2;
    canvas.height = H * 2;
    const ctx = canvas.getContext("2d");
    ctx.scale(2, 2);
    const grad = ctx.createLinearGradient(0, 0, W, H);
    grad.addColorStop(0, "#1a1a2e");
    grad.addColorStop(1, "#2d1b4e");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = "#ffd27f";
    ctx.font = "bold 18px sans-serif";
    ctx.fillText(`${xAccountLabel}今日の占い結果`, 24, 44);
    ctx.strokeStyle = "rgba(255,255,255,0.15)";
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(24, 56); ctx.lineTo(W - 24, 56); ctx.stroke();
    ctx.fillStyle = "#cbd5e1";
    ctx.font = "13px sans-serif";
    ctx.fillText(`${zodiac}　${myRanking.rank}位 / 12星座　運勢スコア ${myRanking.score}点　KIN${kin}・${sunSeal}`, 24, 80);
    ctx.fillStyle = "#a78bfa";
    ctx.font = "bold 28px sans-serif";
    ctx.fillText(`${keyword.en}`, 24, 124);
    ctx.fillStyle = "#94a3b8";
    ctx.font = "14px sans-serif";
    ctx.fillText(`（${keyword.ja}）`, 24, 146);
    ctx.strokeStyle = "rgba(255,255,255,0.1)";
    ctx.beginPath(); ctx.moveTo(24, 160); ctx.lineTo(W - 24, 160); ctx.stroke();
    ctx.fillStyle = "#e2e8f0";
    ctx.font = "13px sans-serif";
    const msgLines = wrapText(ctx, shareMsg, W - 48);
    msgLines.forEach((line, i) => ctx.fillText(line, 24, 182 + i * 20));
    const msgH = 182 + msgLines.length * 20 + 12;
    ctx.fillStyle = "#fbbf24";
    const encLines = wrapText(ctx, `✨ ${encouragement}`, W - 48);
    encLines.forEach((line, i) => ctx.fillText(line, 24, msgH + i * 20));
    ctx.fillStyle = "#64748b";
    ctx.font = "11px sans-serif";
    ctx.fillText(`占い実施日時：${dateLabel}`, 24, H - 36);
    ctx.fillText("四つの星命秘録 by Sumiko Ellington", 24, H - 18);
    return canvas;
  }

  const tweetText = `今日の占い結果🔮\n${xAccountLabel}\n${zodiac} ${myRanking.rank}位／12星座　運勢スコア${myRanking.score}点\nKIN${kin}・${sunSeal}\nキーワード：${keyword.en}（${keyword.ja}）\n${shareMsg}\n#Sumiko占い`;

  if (canShare) {
    // スマホ：Web Share APIボタン1つ
    guideEl.innerHTML = `📌 <strong>結果をシェアする</strong><br>「シェアする」ボタンをタップすると、XやLINEなどのアプリから結果画像を送れます。`;
    const shareBtn = document.createElement("button");
    shareBtn.textContent = "🔗 シェアする";
    shareBtn.addEventListener("click", async () => {
      try {
        const canvas = generateCanvasImage();
        canvas.toBlob(async (blob) => {
          const file = new File([blob], `sumiko_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,"0")}${String(now.getDate()).padStart(2,"0")}.png`, { type: "image/png" });
          await navigator.share({
            title: "四つの星命秘録",
            text: tweetText,
            files: [file]
          });
        }, "image/png");
      } catch(e) {
        if (e.name !== "AbortError") alert("シェアに失敗しました: " + e.message);
      }
    });
    const retryBtn = document.createElement("button");
    retryBtn.textContent = "🔄 最初からやり直す";
    retryBtn.id = "retryBtn";
    btnsEl.appendChild(shareBtn);
    btnsEl.appendChild(retryBtn);
  } else {
    // PC：従来の3ボタン
    guideEl.innerHTML = `📌 <strong>Xでシェアする方法（パソコンの場合）</strong><br>①「画像を保存する」をクリックすると、占い結果カードの画像が保存されます。<br>②「Xでシェアする」をクリックすると、Xの投稿画面が開き、結果のテキストが自動で入力されます。<br>③ 投稿画面で保存した画像を添付してポストしてください。`;
    btnsEl.innerHTML = `
      <button id="saveCardBtn">📷 画像を保存する</button>
      <button id="tweetBtn">𝕏 Xでシェアする</button>
      <button id="retryBtn">🔄 最初からやり直す</button>
    `;
  }

  // やり直すボタン（PC・スマホ共通）
  document.getElementById("retryBtn").addEventListener("click", () => {
    document.getElementById("resultArea").classList.add("hidden");
    document.getElementById("formArea").classList.remove("hidden");
    document.querySelectorAll(".img-choice").forEach(e => e.classList.remove("selected"));
    selectedImage = null; redValue = null; blueValue = null;
    document.getElementById("diceArea").classList.add("hidden");
    document.getElementById("redDice").querySelector(".dice-num").textContent = "?";
    document.getElementById("blueDice").querySelector(".dice-num").textContent = "?";
  });

  // PC用ボタン
  if (!canShare) {
    document.getElementById("tweetBtn").addEventListener("click", () => {
      window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(tweetText)}`, "_blank");
    });

    document.getElementById("saveCardBtn").addEventListener("click", () => {
      try {
        const canvas = generateCanvasImage();
        const dataUrl = canvas.toDataURL("image/png");
        const link = document.createElement("a");
        link.download = `sumiko_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,"0")}${String(now.getDate()).padStart(2,"0")}.png`;
        link.href = dataUrl;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      } catch(e) {
        alert("画像の生成に失敗しました: " + e.message);
      }
    });
  }

  // テキスト折り返し関数
  function wrapText(ctx, text, maxWidth) {
    const lines = [];
    let line = "";
    for (const ch of text) {
      const test = line + ch;
      if (ctx.measureText(test).width > maxWidth && line !== "") {
        lines.push(line);
        line = ch;
      } else {
        line = test;
      }
    }
    if (line) lines.push(line);
    return lines;
  }
});
</script>

</body>
